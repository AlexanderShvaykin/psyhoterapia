problem: 'Этот сайт для того, кто хочет cправиться с такими проблемами, как:'
inner_problems:
  -
    title: детско-родительские и супружеские взаимоотношения
    desc: Пробле́ма (др.-греч. πρόβλημα) в широком смысле — сложный теоретический или практический вопрос, требующий изучения, разрешения; в науке — противоречивая ситуация, выступающая в виде противоположных позиций в объяснении каких-либо явлений, объектов, процессов и требующая адекватной теории для её разрешения; в жизни проблема формулируется в понятном для людей виде «знаю что, не знаю как», то есть известно, что нужно получить, но неизвестно, как это сделать. Важной предпосылкой успешного решения проблемы служит её правильная постановка.
